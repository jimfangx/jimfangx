name: Metrics
on:
  # Schedule daily updates
  schedule: [{cron: "0 0 * * *"}]
  # (optional) Run workflow manually
  workflow_dispatch:
  # (optional) Run workflow when pushing on master/main
  push: {branches: ["master", "main"]}
jobs:
  github-metrics:
    runs-on: ubuntu-latest
    steps:
      - uses: lowlighter/metrics@latest
        with:
          token: ${{ secrets.METRICS_TOKEN }}
          config_timezone: America/Los_Angeles
          repositories_affiliations: owner
          extras_css: |
            .organization.contributions .contribution.organization:nth-of-type(n+6) {
              display: none;
            }
          plugin_lines: yes
          plugin_lines_history_limit: 1
          plugin_languages: yes
          plugin_languages_colors: github
          plugin_languages_limit: 20
          plugin_languages_sections: most-used
          plugin_languages_details: bytes-size, percentage
          plugin_languages_ignored: roff, dockerfile, html, css, makefile, qmake, cmake
          plugin_languages_threshold: 0%
          plugin_notable: yes
          plugin_notable_repositories: yes
          plugin_followup: yes
          plugin_followup_sections: user
          plugin_isocalendar: yes
          plugin_isocalendar_duration: full-year
          plugin_activity: yes
          plugin_activity_limit: 5
          plugin_activity_days: 30
          plugin_activity_visibility: public
          plugin_activity_filter: push, issue, pr, release, review, ref/create
